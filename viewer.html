<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Remote Desktop Viewer</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 24px;
			}
			.controls {
				display: flex;
				gap: 8px;
				margin-bottom: 16px;
			}
			input,
			button {
				padding: 8px;
			}
			#status {
				margin-bottom: 12px;
			}
			video {
				width: 100%;
				max-width: 1000px;
				border: 1px solid #ccc;
				border-radius: 6px;
				background: #000;
			}
		</style>
	</head>
	<body>
		<h1>Viewer</h1>

		<div class="controls">
			<input id="remoteDeviceId" type="text" placeholder="Remote Device ID" value="" />
			<input id="serverUrl" type="text" placeholder="Signaling URL (e.g. http://YOUR_SERVER_IP:3000)" value="" />
			<button id="connectBtn">Connect</button>
		</div>

		<div id="status">Status: idle</div>
		<video id="remoteVideo" autoplay playsinline tabindex="0"></video>

		<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
		<script src="./renderer.js"></script>
	</body>
</html>
