# coturn config for turn.tejas.blog
# Path on Linux server: /etc/turnserver.conf

# Core
server-name=turn.tejas.blog
realm=tejas.blog
listening-port=3478
tls-listening-port=5349

# Network
listening-ip=0.0.0.0
# If server is behind NAT, uncomment and set public/private IP mapping:
# external-ip=<PUBLIC_IP>/<PRIVATE_IP>

# Relay range (open these UDP ports in firewall)
min-port=49160
max-port=49200

# Authentication (matches app-config.json username/credential)
lt-cred-mech
user=replace-with-turn-username:replace-with-turn-password

# TLS (use certbot for turn.tejas.blog)
cert=/etc/letsencrypt/live/turn.tejas.blog/fullchain.pem
pkey=/etc/letsencrypt/live/turn.tejas.blog/privkey.pem

# WebRTC compatibility and hardening
fingerprint
stale-nonce
no-loopback-peers
no-multicast-peers

# Logging
simple-log
log-file=/var/log/turnserver/turn.log

# Optional but common
no-cli
